; ============================================================
;  IR Remote Web GUI — PlatformIO Configuration
;  v7.1.0  |  Target: ESP32-WROOM-32 (4 MB Flash)
;  Framework: Arduino + espressif32 @ 6.6.0 (IDF 4.4.x)
;
;  FIRMWARE SIZE FIX (was 1571 KB, limit 1408 KB = +126 KB overflow):
;
;  Root cause: -D_IR_ENABLE_DEFAULT_=true compiles ALL 124 IR protocol
;  decoders/encoders from IRremoteESP8266 into the binary (~400 KB).
;
;  Fix applied:
;    1. Replace _IR_ENABLE_DEFAULT_=true with per-protocol -D flags
;       enabling only the 116 protocols actually used in this project.
;       Removes 8 obscure protocols (~64-120 KB savings).
;    2. -ffunction-sections + -fdata-sections + --gc-sections:
;       each function in its own section, unused ones stripped by linker.
;    3. -Os: optimize for minimum size.
;
;  NOTE: -flto is intentionally EXCLUDED.
;  toolchain-xtensa-esp32 @ 8.4.0 (GCC 8.4) has a broken LTO plugin
;  that causes "plugin needed to handle lto object" at link time,
;  which then strips app_main() → "undefined reference to app_main".
;  This is a known GCC 8.4 + xtensa toolchain incompatibility.
;
;  Expected savings without LTO: ~80-120 KB → binary fits in 1408 KB.
; ============================================================

[platformio]
src_dir     = src
include_dir = include
data_dir    = data

[env:esp32dev]
platform  = espressif32 @ 6.6.0
board     = esp32dev
framework = arduino

monitor_speed = 115200

board_build.partitions = partitions_custom.csv
board_build.filesystem = littlefs

build_unflags =
    -std=gnu++11
    -O2

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DLOG_LOCAL_LEVEL=ESP_LOG_ERROR
    -DBOARD_HAS_PSRAM=0
    -DARDUINO_ESP32_DEV
    -std=gnu++17
    -Os
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
    ; WSL-Bypasser: wifi_pen_module.cpp overrides ieee80211_raw_frame_sanity_check
    ; (provided by closed-source libnet80211.a) so the deauth/beacon attack code
    ; can call esp_wifi_80211_tx() with raw 802.11 frames. In newer
    ; arduino-esp32 the IDF symbol is no longer `weak`, so the link sees a
    ; multiple-definition error. --allow-multiple-definition tells ld to pick
    ; the first definition encountered (ours, since our object file precedes
    ; the closed-source archive).
    -Wl,--allow-multiple-definition
    -Wno-unused-parameter
    -Wno-format-truncation
    -Wno-cpp
    -DFIRMWARE_VERSION=\"10.0.0\"

    ; ── IR protocols — selective enable (replaces _IR_ENABLE_DEFAULT_=true)
    ; Enables all 116 protocols used by ir_receiver.cpp and ir_transmitter.cpp.
    ; Omits 8 rarely-encountered protocols that were in the full library but
    ; are not referenced anywhere in this codebase, saving ~64-120 KB.
    -D_IR_ENABLE_AIRTON_=true
    -D_IR_ENABLE_AIRWELL_=true
    -D_IR_ENABLE_AIWA_RC_T501_=true
    -D_IR_ENABLE_AMCOR_=true
    -D_IR_ENABLE_ARGO_=true
        -D_IR_ENABLE_BOSCH144_=true
    -D_IR_ENABLE_BOSE_=true
    -D_IR_ENABLE_CARRIER_AC_=true
    -D_IR_ENABLE_CARRIER_AC128_=true
    -D_IR_ENABLE_CARRIER_AC40_=true
    -D_IR_ENABLE_CARRIER_AC64_=true
    -D_IR_ENABLE_CARRIER_AC84_=true
    -D_IR_ENABLE_CLIMABUTLER_=true
    -D_IR_ENABLE_COOLIX_=true
    -D_IR_ENABLE_COOLIX48_=true
    -D_IR_ENABLE_CORONA_AC_=true
    -D_IR_ENABLE_DAIKIN_=true
    -D_IR_ENABLE_DAIKIN128_=true
    -D_IR_ENABLE_DAIKIN152_=true
    -D_IR_ENABLE_DAIKIN160_=true
    -D_IR_ENABLE_DAIKIN176_=true
    -D_IR_ENABLE_DAIKIN2_=true
    -D_IR_ENABLE_DAIKIN200_=true
    -D_IR_ENABLE_DAIKIN216_=true
    -D_IR_ENABLE_DAIKIN312_=true
    -D_IR_ENABLE_DAIKIN64_=true
    -D_IR_ENABLE_DELONGHI_AC_=true
    -D_IR_ENABLE_DENON_=true
    -D_IR_ENABLE_DISH_=true
    -D_IR_ENABLE_DOSHISHA_=true
    -D_IR_ENABLE_ECOCLIM_=true
    -D_IR_ENABLE_ELECTRA_AC_=true
    -D_IR_ENABLE_ELITESCREENS_=true
    -D_IR_ENABLE_EPSON_=true
    -D_IR_ENABLE_FUJITSU_AC_=true
        -D_IR_ENABLE_GOODWEATHER_=true
    -D_IR_ENABLE_GORENJE_=true
    -D_IR_ENABLE_GREE_=true
    -D_IR_ENABLE_HAIER_AC_=true
    -D_IR_ENABLE_HAIER_AC160_=true
    -D_IR_ENABLE_HAIER_AC176_=true
    -D_IR_ENABLE_HAIER_AC_YRW02_=true
    -D_IR_ENABLE_HITACHI_AC_=true
