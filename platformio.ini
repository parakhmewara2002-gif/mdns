        -D_IR_ENABLE_XMP_=true
    -D_IR_ENABLE_YORK_=true
    -D_IR_ENABLE_ZEPEAL_=true

    ; ── AsyncTCP core affinity + stack size ─────────────────
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=0
    -DCONFIG_ASYNC_TCP_USE_WDT=0
    -DCONFIG_ASYNC_TCP_STACK_SIZE=8192

    ; ── SD card SPI pins (VSPI bus) ─────────────────────────
    -DSD_CS_PIN=4
    -DSD_MOSI_PIN=23
    -DSD_MISO_PIN=19
    -DSD_SCK_PIN=18
    -DSD_SPI_FREQ=4000000UL

    ; ── Module config paths ───────────────────────────────────
    -DNFC_GPIO_FILE=\"/nfc_gpio.json\"
    -DRFID_GPIO_FILE=\"/rfid_gpio.json\"
    -DSUBGHZ_GPIO_FILE=\"/subghz_gpio.json\"
    -DNRF24_GPIO_FILE=\"/nrf24_gpio.json\"

lib_deps =
    ; BLE is part of ESP32 Arduino core (espressif32) - no extra lib needed.
    ; BLEDevice, BLEServer, BLEClient, BLEHIDDevice are all bundled in the SDK.
    ; If compile errors: ensure espressif32 >= 6.6.0 (IDF 4.4.x has full BLE stack).
    crankyoldgit/IRremoteESP8266 @ 2.8.6
    mathieucarbou/ESPAsyncWebServer @ 3.3.12
    mathieucarbou/AsyncTCP @ 3.2.4
    bblanchon/ArduinoJson @ 7.2.1
    nRF24/RF24 @ 1.4.8
    fastled/FastLED @ 3.6.0
    https://github.com/adafruit/Adafruit-PN532.git#1.3.1
    https://github.com/adafruit/Adafruit_BusIO.git#1.16.1

upload_speed = 921600
